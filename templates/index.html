<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Financial Sentiment Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<script>

const form=document.querySelector("form");

form.addEventListener("submit",function(){

document.getElementById("predictBtn").innerHTML=

`<span class="spinner-border spinner-border-sm"></span>
 Analyzing...`;

});

</script>

<body>

<div class="overlay">

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg">

<div class="card-body">

<h1 class="text-center mb-2">

💹 Financial Sentiment Analysis

</h1>

<p class="text-center text-muted">

AI Powered by FinBERT

</p>

<form action="/predict" method="POST">

<div class="mb-3">

<textarea
class="form-control"
rows="6"
name="text"
placeholder="Enter financial news here..."
required>{{ text if text else "" }}</textarea>

</div>

<div class="d-grid">

<button
id="predictBtn"
class="btn btn-primary btn-lg"
type="submit">

Analyze Sentiment

</button>

</div>

</form>

{% if prediction %}

<hr>

<h3 class="text-center">

Prediction

</h3>

<div class="text-center">

{% if prediction=="positive" %}

<span class="badge bg-success p-3 fs-5">

🟢 Positive

</span>

{% elif prediction=="negative" %}

<span class="badge bg-danger p-3 fs-5">

🔴 Negative

</span>

{% else %}

<span class="badge bg-secondary p-3 fs-5">

⚪ Neutral

</span>

{% endif %}

</div>

<div class="mt-4">

<h5>

Confidence

</h5>

<div class="progress">

<div
class="progress-bar"

role="progressbar"

style="width: {{ confidence }}%;">

{{ confidence }}%

</div>

</div>

</div>

{% endif %}

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
